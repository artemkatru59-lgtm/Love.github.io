<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;user-select:none;}
  canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
  #scene{position:fixed;inset:0;z-index:1;overflow:hidden;pointer-events:none;}

  .item{
    position:absolute;
    top:-300px;
    animation:fall linear infinite;
    will-change:transform;
  }
  @keyframes fall{
    0%  {transform:translateY(0)     rotate(var(--r0));opacity:0;}
    6%  {opacity:1;}
    88% {opacity:1;}
    100%{transform:translateY(115vh) rotate(var(--r1));opacity:0;}
  }
  .word{
    font-family:'Dancing Script',cursive;
    white-space:nowrap;
    text-shadow:0 0 8px currentColor,0 0 18px currentColor;
  }
  .heart-el{line-height:1;filter:drop-shadow(0 0 7px #ff2244);}
  .photo-el{border-radius:6px;overflow:hidden;box-shadow:0 0 22px rgba(255,40,100,.45);}
  .photo-el img{width:100%;height:100%;object-fit:cover;display:block;}
</style>

];

/* ══ SETTINGS ══════════════════════════════════════════════════ */
const PHRASES = [
  // core
  'я люблю тебя','i love you','я люблю тебя','i love you',
  'i love you','i love you','я люблю тебя','i love you',
  'i love you ♡','я люблю тебя ♡','i love you ♡♡',
  // compliments RU
  'ты самая лучшая','ты самая красивая','ты моя любовь',
  'ты моё солнышко','ты моя вселенная','ты совершенна',
  'ты моё всё','ты делаешь меня счастливым','ты неповторима',
  'ты моя мечта','я думаю о тебе всегда','ты моя жизнь',
  'ты моя радость','с тобой мне хорошо','ты бесценна',
  'обожаю тебя','скучаю по тебе','навсегда твой',
  // compliments EN
  'you are the best','you are so beautiful','you are my sunshine',
  'you are my world','you are perfect','you are my dream',
  'you mean everything to me','i think about you always',
  'you make me smile','forever yours','always & forever',
  'my heart is yours','you are one in a million',
  'you are my happy place','i adore you','missing you',
  // short sweet
  'люблю','love you ♡','always','навсегда','ты моя',
  'my everything','моё всё','mine','моя',
];
const COLORS = ['#ff2255','#ff55aa','#ff99cc','#ffccdd','#ffffff','#ff44bb','#ff0055','#ff77aa'];
const HEARTS = ['❤️','❤','♥','♡','❤️','❤️','❤'];

/* ══ STARFIELD ═════════════════════════════════════════════════ */
const cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
let W,H;
const resize=()=>{W=cvs.width=innerWidth;H=cvs.height=innerHeight;};
resize(); window.addEventListener('resize',resize);
const stars=Array.from({length:60},()=>({
  x:Math.random()*2000,y:Math.random()*1200,
  r:Math.random()*.9+.15,a:Math.random()*Math.PI*2,
  s:Math.random()*.2+.04,op:Math.random()*.55+.1,
  col:COLORS[Math.floor(Math.random()*COLORS.length)],
}));
(function tick(){
  ctx.clearRect(0,0,W,H);
  for(const s of stars){
    ctx.globalAlpha=s.op*(0.55+0.45*Math.sin(Date.now()/900+s.a));
    ctx.fillStyle=s.col;
    ctx.beginPath();ctx.arc(s.x%W,s.y%H,s.r,0,Math.PI*2);ctx.fill();
    s.y+=s.s; s.x+=Math.sin(s.a+Date.now()/2200)*.18;
    if(s.y>H+2)s.y=-2;
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(tick);
})();

/* ══ SPAWN HELPER ══════════════════════════════════════════════ */
const scene=document.getElementById('scene');
const rnd=(a,b)=>a+Math.random()*(b-a);

function spawn({cls,left,dmin,dmax,extra,build}){
  const el=document.createElement('div');
  el.className='item '+cls;
  const r0=rnd(-22,22),r1=rnd(-30,30);
  const dur=rnd(dmin,dmax);
  el.style.cssText=`left:${left}%;--r0:${r0}deg;--r1:${r1}deg;`
    +`animation-duration:${dur}s;`
    +`animation-delay:-${rnd(0,dmax*.8)}s;${extra||''}`;
  if(build)build(el);
  scene.appendChild(el);
  // auto-remove after one cycle to keep DOM clean
  el.addEventListener('animationiteration',()=>el.remove(),{once:true});
}

/* ══ POPULATE ══════════════════════════════════════════════════ */
// — words (mobile-optimised: 45 items cycling fast)
for(let i=0;i<45;i++){
  const phrase=PHRASES[Math.floor(Math.random()*PHRASES.length)];
  const size=rnd(11,44);
  const col=COLORS[Math.floor(Math.random()*COLORS.length)];
  spawn({
    cls:'word', left:rnd(-2,92), dmin:5, dmax:14,
    extra:`font-size:${size}px;color:${col};font-style:${Math.random()>.4?'italic':'normal'};`,
    build(el){el.textContent=phrase;}
  });
}

// — hearts (25 items)
for(let i=0;i<25;i++){
  const ch=HEARTS[Math.floor(Math.random()*HEARTS.length)];
  const size=rnd(20,72);
  spawn({
    cls:'heart-el', left:rnd(-2,95), dmin:4, dmax:12,
    extra:`font-size:${size}px;`,
    build(el){el.textContent=ch;}
  });
}

// — photos: one at a time, every 4 seconds, clearly visible
let photoIndex = 0;
function spawnNextPhoto(){
  if(!PHOTOS.length) return;
  const p = PHOTOS[photoIndex % PHOTOS.length];
  photoIndex++;
  const w = Math.min(innerWidth * 0.72, 260);
  const h = w * rnd(0.75, 1.3);
  const el = document.createElement('div');
  el.className = 'item photo-el';
  const r0 = rnd(-10,10), r1 = rnd(-12,12);
  const dur = rnd(9,13);
  const left = rnd(5, Math.max(10, 95 - (w/3.6)));
  el.style.cssText = `left:${left}%;width:${w}px;height:${h}px;--r0:${r0}deg;--r1:${r1}deg;animation-duration:${dur}s;animation-delay:0s;z-index:10;`;
  const img = document.createElement('img');
  img.src = p.src; img.alt = '';
  el.appendChild(img);
  scene.appendChild(el);
  el.addEventListener('animationiteration', ()=>el.remove(), {once:true});
}
setTimeout(()=>{ spawnNextPhoto(); setInterval(spawnNextPhoto, 4000); }, 1000);

/* ══ CONTINUOUS REFILL ═════════════════════════════════════════ */
setInterval(()=>{
  if(scene.querySelectorAll('.word').length<40){
    const phrase=PHRASES[Math.floor(Math.random()*PHRASES.length)];
    const size=rnd(11,44),col=COLORS[Math.floor(Math.random()*COLORS.length)];
    spawn({
      cls:'word',left:rnd(-2,92),dmin:5,dmax:14,
      extra:`font-size:${size}px;color:${col};font-style:${Math.random()>.4?'italic':'normal'};animation-delay:0s;`,
      build(el){el.textContent=phrase;}
    });
  }
  if(scene.querySelectorAll('.heart-el').length<20){
    spawn({
      cls:'heart-el',left:rnd(-2,95),dmin:4,dmax:12,
      extra:`font-size:${rnd(20,72)}px;animation-delay:0s;`,
      build(el){el.textContent=HEARTS[Math.floor(Math.random()*HEARTS.length)];}
    });
  }
},500);
</script>
